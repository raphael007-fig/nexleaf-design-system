function splitIconWords(name) {
  return name.replace(/Icon$/, '')
    .replace(/([A-Z][a-z]*)/g, ' $1').trim()
    .split(' ').filter(Boolean).map(w => w.toLowerCase());
}

function PolarisIconImg({ name, size=20, color='currentColor' }) {
  const [err, setErr] = useState(false);
  const data = POLARIS_ICON_DATA[name];
  if (data) {
    return (
      <svg width={size} height={size} viewBox={data.viewBox} fill={color}
        dangerouslySetInnerHTML={{__html: data.body}}
        style={{flexShrink:0,display:'block'}}/>
    );
  }
  if (err) return (
    <div style={{width:size,height:size,background:'#f0f0f0',borderRadius:4,
                  flexShrink:0,display:'flex',alignItems:'center',justifyContent:'center'}}>
      <div style={{width:size*0.4,height:size*0.4,background:'#d0d0d0',borderRadius:2}}/>
    </div>
  );
  return (
    <img src={POLARIS_CDN(name)} width={size} height={size} loading="lazy"
      onError={()=>setErr(true)} style={{flexShrink:0,display:'block'}}/>
  );
}

function ModalCodeTabs({ name }) {
  const [tab, setTab] = useState('react');
  const data = POLARIS_ICON_DATA[name];
  const camelBase = name.replace(/Icon$/, '');
  const kebab = camelBase.replace(/([A-Z])/g, m => '-' + m.toLowerCase()).replace(/^-/, '');
  const selector = `app-${kebab}-icon`;
  const svgBody = data ? data.body : '<!-- SVG paths from @shopify/polaris-icons -->';
  const jsxBody = data ? data.body : '{/* SVG paths from @shopify/polaris-icons */}';

  const tabs = [
    {key:'react',    label:'React'},
    {key:'angular',  label:'Angular template'},
    {key:'ngSrc',    label:'Angular source'},
  ];
  const code = {
    react:
`const ${name} = ({ size = 20, color = 'currentColor' }) => (
  <svg width={size} height={size} viewBox="0 0 20 20" fill={color}>
    ${jsxBody}
  </svg>
);`,
    angular:
`<${selector}
  [size]="20"
  color="#616161"
/>`,
    ngSrc:
`import { Component, Input } from '@angular/core';

@Component({
  selector: '${selector}',
  standalone: true,
  template: \`
    <svg [attr.width]="size" [attr.height]="size"
         viewBox="0 0 20 20" [attr.fill]="color">
      ${svgBody}
    </svg>
  \`,
})
export class ${camelBase}IconComponent {
  @Input() size = 20;
  @Input() color = 'currentColor';
}`,
  };

  return (
    <div style={{border:'1px solid #e0e0e0',borderRadius:8,overflow:'hidden'}}>
      <div style={{display:'flex',background:'#f7f9fc',borderBottom:'1px solid #e0e0e0'}}>
        {tabs.map(t => (
          <button key={t.key} onClick={()=>setTab(t.key)} style={{
            padding:'7px 14px',fontSize:12,fontFamily:'Inter,sans-serif',border:'none',
            background:'transparent',cursor:'pointer',outline:'none',
            fontWeight: t.key===tab ? 600 : 400,
            color: t.key===tab ? '#303030' : '#616161',
            borderBottom: t.key===tab ? '2px solid #303030' : '2px solid transparent',
            transition:'color 0.12s',
          }}>{t.label}</button>
        ))}
      </div>
      <div style={{background:'#f7f9fc',padding:'12px 14px',maxHeight:240,overflowY:'auto'}}>
        <pre style={{margin:0,fontFamily:'monospace',fontSize:11.5,color:'#24292e',
                      lineHeight:1.6,whiteSpace:'pre-wrap',wordBreak:'break-word'}}>
          {code[tab]}
        </pre>
      </div>
    </div>
  );
}

function PolarisIconCell({ name, onClick }) {
  const [hov, setHov] = useState(false);
  return (
    <div onClick={()=>onClick(name)}
      onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)}
      style={{
        display:'flex',alignItems:'center',gap:10,padding:'12px 16px',
        cursor:'pointer',background:hov?'#f7f9fc':'#fff',
        borderRight:'1px solid #e0e0e0',borderBottom:'1px solid #e0e0e0',
        transition:'background 0.1s',minWidth:0,overflow:'hidden',boxSizing:'border-box',
      }}>
      <PolarisIconImg name={name} size={20}/>
      <span style={{fontSize:13,fontFamily:'Inter,sans-serif',color:'#303030',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
        {name}
      </span>
    </div>
  );
}

function IconsPage() {
  const [search, setSearch] = useState('');
  const [selected, setSelected] = useState(null);

  const filtered = search
    ? ALL_ICONS.filter(n => n.toLowerCase().includes(search.toLowerCase()))
    : ALL_ICONS;

  function renderModal() {
    if (!selected) return null;
    const words = splitIconWords(selected);
    return (
      <Overlay onClose={()=>setSelected(null)}>
        <div className="modal-anim" style={{background:'#fff',borderRadius:16,padding:28,
                                             width:'100%',maxWidth:480,boxSizing:'border-box'}}>
          <PolarisIconImg name={selected} size={40}/>
          <h2 style={{fontFamily:'Inter,sans-serif',fontSize:20,fontWeight:700,
                      color:'#303030',margin:'14px 0 6px'}}>{selected}</h2>
          <p style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#616161',
                     lineHeight:1.6,marginBottom:14}}>
            Use this icon to represent {words.join(' ')}-related actions or states.
          </p>
          <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:20}}>
            {words.map(w=>(
              <span key={w} style={{fontSize:12,fontFamily:'Inter,sans-serif',color:'#303030',
                                     background:'#f1f1f1',padding:'3px 10px',borderRadius:100,
                                     border:'1px solid #e0e0e0'}}>
                {w}
              </span>
            ))}
          </div>
          <a href={POLARIS_CDN(selected)} target="_blank" rel="noreferrer"
            style={{display:'flex',alignItems:'center',justifyContent:'center',
                    padding:'10px 20px',background:'#1a6651',color:'#fff',borderRadius:8,
                    fontFamily:'Inter,sans-serif',fontSize:14,fontWeight:600,
                    textDecoration:'none',marginBottom:20,width:'100%',boxSizing:'border-box'}}>
            Download
          </a>
          <Divider/>
          <div style={{padding:'16px 0'}}>
            <p style={{fontFamily:'Inter,sans-serif',fontSize:15,fontWeight:700,
                        color:'#303030',marginBottom:6}}>Figma</p>
            <p style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#616161',lineHeight:1.6}}>
              Use the{' '}
              <a href="https://www.figma.com/community/file/1110993965108325096" target="_blank"
                style={{color:'#005bd3'}}>Polaris Icon Library</a>
              {' '}to access all icons right inside Figma.
            </p>
          </div>
          <Divider/>
          <div style={{paddingTop:16}}>
            <ModalCodeTabs name={selected}/>
          </div>
        </div>
      </Overlay>
    );
  }

  return (
    <div className="page" style={{maxWidth:1200}}>
      <div className="page-hero">
        <div className="page-category">Foundation</div>
        <h1 className="page-title">Icons</h1>
        <p className="page-desc">
          Icons from <strong>@shopify/polaris-icons</strong>. Click any icon to see usage, download the SVG, or copy the React import.
        </p>
      </div>

      {/* Search */}
      <div style={{marginBottom:20}}>
        <div style={{display:'flex',alignItems:'center',gap:10,background:'#fff',
                     border:'1.5px solid #e0e0e0',borderRadius:100,padding:'10px 18px'}}>
          <svg width="18" height="18" viewBox="0 0 20 20" fill="none">
            <circle cx="9" cy="9" r="5.5" stroke="#9e9e9e" strokeWidth="1.5"/>
            <path d="M13.5 13.5L16.5 16.5" stroke="#9e9e9e" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <input placeholder="Search icons" value={search}
            onChange={e=>setSearch(e.target.value)}
            style={{flex:1,border:'none',outline:'none',background:'transparent',
                    fontSize:15,fontFamily:'Inter,sans-serif',color:'#303030'}}/>
          {search && (
            <button onClick={()=>setSearch('')}
              style={{border:'none',background:'none',cursor:'pointer',color:'#9e9e9e',
                      fontSize:18,lineHeight:1,padding:0,display:'flex',alignItems:'center'}}>×</button>
          )}
        </div>
      </div>

      <p style={{fontFamily:'Inter,sans-serif',fontSize:13,color:'#9e9e9e',marginBottom:16}}>
        {filtered.length} icon{filtered.length!==1?'s':''}
      </p>

      {/* Grid */}
      <div style={{border:'1px solid #e0e0e0',borderRadius:12,overflow:'hidden',background:'#fff'}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)'}}>
          {filtered.map(name=>(
            <PolarisIconCell key={name} name={name} onClick={setSelected}/>
          ))}
        </div>
      </div>

      {renderModal()}
    </div>
  );
}

function PaginationBtn({ direction, disabled, type='page', onClick }) {
  const [hov, setHov] = React.useState(false);
  const [act, setAct] = React.useState(false);
  const isPage = type === 'page';

  // page: filled gray at rest; table: transparent at rest, fills on hover
  const bg = disabled
    ? (isPage ? 'rgba(0,0,0,0.04)' : 'transparent')
    : act  ? 'rgba(0,0,0,0.17)'
    : hov  ? 'rgba(0,0,0,0.13)'
    : isPage ? 'rgba(0,0,0,0.08)' : 'transparent';

  const shadow = act && !disabled ? BTN_SHADOW_ACTIVE : 'none';
  const br = direction === 'prev' ? '8px 0 0 8px' : '0 8px 8px 0';

  return (
    <button
      onClick={!disabled ? onClick : undefined}
      disabled={disabled}
      onMouseEnter={() => setHov(true)}
      onMouseLeave={() => { setHov(false); setAct(false); }}
      onMouseDown={() => !disabled && setAct(true)}
      onMouseUp={() => setAct(false)}
      style={{
        display:'flex', alignItems:'center', justifyContent:'center',
        padding:4, border:'none', outline:'none',
        borderRadius:br, background:bg, boxShadow:shadow,
        position:'relative', overflow:'hidden',
        cursor:disabled ? 'not-allowed' : 'pointer',
        transition:'background 0.1s',
      }}
    >
      {direction === 'prev'
        ? <PolarisIconImg name="ChevronLeftIcon"  size={20} color={disabled ? '#b5b5b5' : '#303030'}/>
        : <PolarisIconImg name="ChevronRightIcon" size={20} color={disabled ? '#b5b5b5' : '#303030'}/>}
    </button>
  );
}

function Pagination({ hasPrevious=false, hasNext=true, onPrevious, onNext, label, type='page' }) {
  if (type === 'table') {
    return (
      <div style={{
        display:'flex', alignItems:'center', width:'100%',
        background:'#f7f9fc', padding:'6px 8px 6px 12px',
      }}>
        {label && (
          <span style={{fontSize:13, fontWeight:450, color:'#303030', lineHeight:'20px',
                        whiteSpace:'nowrap', fontFamily:'Inter,sans-serif'}}>
            {label}
          </span>
        )}
        <div style={{flex:'1 0 0', display:'flex', alignItems:'center', justifyContent:'flex-end'}}>
          <PaginationBtn direction="prev" disabled={!hasPrevious} onClick={onPrevious} type="table"/>
          <PaginationBtn direction="next" disabled={!hasNext}     onClick={onNext}     type="table"/>
        </div>
      </div>
    );
  }
  // page type
  return (
    <div style={{display:'flex', alignItems:'center'}}>
      <PaginationBtn direction="prev" disabled={!hasPrevious} onClick={onPrevious} type="page"/>
      {label && (
        <div style={{padding:'4px 12px', fontSize:13, fontWeight:450, color:'#303030',
                     lineHeight:'20px', whiteSpace:'nowrap', fontFamily:'Inter,sans-serif'}}>
          {label}
        </div>
      )}
      <PaginationBtn direction="next" disabled={!hasNext} onClick={onNext} type="page"/>
    </div>
  );
}

function Tabs({
  tabs=[],
  activeIndex=0,
  onChange,
  fitted=false,
  moreViews=false,
  canAddNew=false,
  mobile=false,
}) {
  const [hovIdx, setHovIdx] = useState(null);
  const [focIdx, setFocIdx] = useState(null);
  const fontSize = mobile ? 14 : 12;
  const lineH = mobile ? '20px' : '16px';

  function tabBg(key, disabled) {
    if (disabled) return 'transparent';
    if (key === activeIndex) return 'rgba(0,0,0,0.08)';
    if (hovIdx === key || focIdx === key) return 'rgba(0,0,0,0.05)';
    return 'transparent';
  }

  return (
    <div role="tablist" style={{display:'flex',gap:4,padding:'0 4px',alignItems:'center',fontFamily:'Inter,sans-serif'}}>
      {tabs.map((tab, i) => {
        const isActive = i === activeIndex;
        const isFoc = focIdx === i;
        const rightPad = isActive && tab.actions ? 8 : 12;
        return (
          <div key={i} role="tab" aria-selected={isActive} tabIndex={tab.disabled ? -1 : 0}
            onClick={() => !tab.disabled && onChange && onChange(i)}
            onKeyDown={e => { if (e.key==='Enter'||e.key===' ') { e.preventDefault(); !tab.disabled && onChange && onChange(i); }}}
            onMouseEnter={() => !tab.disabled && setHovIdx(i)}
            onMouseLeave={() => setHovIdx(null)}
            onFocus={() => setFocIdx(i)}
            onBlur={() => setFocIdx(null)}
            style={{
              display:'flex',alignItems:'center',justifyContent:'center',
              height:28, padding:`6px ${rightPad}px 6px 12px`,
              borderRadius:8,
              background: tabBg(i, tab.disabled),
              cursor: tab.disabled ? 'default' : 'pointer',
              flexShrink: fitted ? undefined : 0,
              flex: fitted ? '1 0 0' : undefined,
              minWidth: fitted ? 1 : undefined,
              position:'relative', outline:'none',
              transition:'background 0.1s', userSelect:'none', boxSizing:'border-box',
            }}>
            {isFoc && <div style={{position:'absolute',inset:-1,borderRadius:8,border:'2px solid #005bd3',pointerEvents:'none',zIndex:1}}/>}
            <span style={{fontSize,fontWeight:550,lineHeight:lineH,color:tab.disabled?'#b5b5b5':'#303030',whiteSpace:'nowrap'}}>{tab.label}</span>
            {tab.badge !== undefined && (
              <div style={{paddingLeft:8,flexShrink:0,display:'flex',alignItems:'center'}}>
                <div style={{background:'rgba(0,0,0,0.06)',borderRadius:8,height:20,padding:'2px 8px',display:'flex',alignItems:'center'}}>
                  <span style={{fontSize:12,fontWeight:550,color:tab.disabled?'#b5b5b5':'#616161',lineHeight:'16px',whiteSpace:'nowrap'}}>{tab.badge}</span>
                </div>
              </div>
            )}
            {isActive && tab.actions && (
              <div style={{marginLeft:4,display:'flex',alignItems:'center',flexShrink:0}}>
                <TabsCaretDown size={16} color="#303030"/>
              </div>
            )}
          </div>
        );
      })}
      {moreViews && (
        <div tabIndex={0}
          onMouseEnter={() => setHovIdx('more')} onMouseLeave={() => setHovIdx(null)}
          style={{display:'flex',alignItems:'center',height:28,padding:'6px 8px 6px 12px',borderRadius:8,
            background:hovIdx==='more'?'rgba(0,0,0,0.05)':'transparent',
            cursor:'pointer',transition:'background 0.1s',outline:'none',userSelect:'none',flexShrink:0}}>
          <span style={{fontSize,fontWeight:550,lineHeight:lineH,color:'#303030',whiteSpace:'nowrap'}}>More views</span>
          <TabsCaretDown size={20} color="#303030"/>
        </div>
      )}
      {canAddNew && (
        <div tabIndex={0}
          onMouseEnter={() => setHovIdx('add')} onMouseLeave={() => setHovIdx(null)}
          style={{display:'flex',alignItems:'center',justifyContent:'center',padding:'4px 6px',borderRadius:8,
            background:hovIdx==='add'?'rgba(0,0,0,0.05)':'transparent',
            cursor:'pointer',transition:'background 0.1s',outline:'none',flexShrink:0}}>
          <TabsPlusIcon color="#303030"/>
        </div>
      )}
    </div>
  );
}

function OptionList({
  title,
  options=[],
  selected,
  onChange,
  allowMultiple=false,
  sections=[],
  error,
}) {
  const [hovKey, setHovKey] = useState(null);
  const [focKey, setFocKey] = useState(null);

  const resolvedSections = sections.length > 0
    ? sections
    : [{title, options}];

  function isSelected(val) {
    if (allowMultiple) return Array.isArray(selected) && selected.includes(val);
    return selected === val;
  }

  function handleSelect(val, disabled) {
    if (disabled || !onChange) return;
    if (allowMultiple) {
      const curr = Array.isArray(selected) ? selected : [];
      const next = curr.includes(val) ? curr.filter(v=>v!==val) : [...curr, val];
      onChange(next);
    } else {
      onChange(val);
    }
  }

  function itemBg(val, disabled, key) {
    if (disabled) return 'transparent';
    if (isSelected(val)) return '#ebebeb';
    if (hovKey === key) return '#f1f1f1';
    return 'transparent';
  }

  return (
    <div style={{background:'#fff',border:'1px solid #e0e0e0',borderRadius:8,
                 padding:4,fontFamily:'Inter,sans-serif',
                 display:'inline-flex',flexDirection:'column',minWidth:160}}>
      {resolvedSections.map((section, si) => (
        <div key={si}>
          {section.title && (
            <div style={{padding:'2px 6px 4px',userSelect:'none'}}>
              <span style={{fontSize:13,fontWeight:650,lineHeight:'20px',color:'#303030'}}>
                {section.title}
              </span>
            </div>
          )}
          {(section.options||[]).map((opt) => {
            const key = `${si}-${opt.value}`;
            const sel = isSelected(opt.value);
            const foc = focKey === key;
            return (
              <div key={opt.value}
                tabIndex={opt.disabled ? -1 : 0}
                role="option" aria-selected={sel}
                onClick={() => handleSelect(opt.value, opt.disabled)}
                onKeyDown={e=>{ if(e.key==='Enter'||e.key===' '){e.preventDefault();handleSelect(opt.value,opt.disabled);}}}
                onMouseEnter={()=>!opt.disabled&&setHovKey(key)}
                onMouseLeave={()=>setHovKey(null)}
                onFocus={()=>setFocKey(key)}
                onBlur={()=>setFocKey(null)}
                style={{
                  display:'flex', alignItems:'center', gap:8,
                  padding:6, borderRadius:8,
                  background: itemBg(opt.value, opt.disabled, key),
                  cursor: opt.disabled ? 'not-allowed' : 'pointer',
                  position:'relative', outline:'none',
                  transition:'background 0.1s', userSelect:'none',
                }}>
                {foc && !opt.disabled && (
                  <div style={{position:'absolute',inset:-1,borderRadius:9,
                               border:'2px solid #005bd3',pointerEvents:'none',zIndex:1}}/>
                )}
                {allowMultiple && (
                  <div onClick={e=>e.stopPropagation()} style={{flexShrink:0}}>
                    <Checkbox
                      checked={sel}
                      disabled={opt.disabled}
                      onChange={()=>handleSelect(opt.value, opt.disabled)}
                    />
                  </div>
                )}
                {opt.media && (
                  <div style={{flexShrink:0,display:'flex',alignItems:'center'}}>
                    {opt.media === true
                      ? <IcoMediaPlaceholder color={opt.disabled?'#b5b5b5':'#616161'}/>
                      : opt.media}
                  </div>
                )}
                <div style={{display:'flex',flexDirection:'column',gap:2,flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span style={{
                      fontSize:13,
                      fontWeight: (!allowMultiple && sel) ? 650 : 450,
                      lineHeight:'20px',
                      color: opt.disabled ? '#b5b5b5' : '#303030',
                      whiteSpace:'nowrap',
                    }}>{opt.label}</span>
                    {opt.badge && (
                      <div style={{display:'inline-flex',alignItems:'center',
                                   background:'rgba(0,0,0,0.06)',borderRadius:8,
                                   height:20,padding:'2px 8px'}}>
                        <span style={{fontSize:12,fontWeight:550,lineHeight:'16px',
                                      color:opt.disabled?'#b5b5b5':'#616161',whiteSpace:'nowrap'}}>
                          {typeof opt.badge==='string'?opt.badge:'Label'}
                        </span>
                      </div>
                    )}
                  </div>
                  {opt.description && (
                    <span style={{fontSize:11,fontWeight:450,lineHeight:'16px',
                                  color:opt.disabled?'#b5b5b5':'#616161',whiteSpace:'nowrap'}}>
                      {opt.description}
                    </span>
                  )}
                </div>
                {!allowMultiple && sel && (
                  <IcoCheckTick color="#303030" size={20}/>
                )}
              </div>
            );
          })}
        </div>
      ))}
      {error && (
        <div style={{display:'flex',alignItems:'center',gap:6,padding:'4px 6px 2px'}}>
          <svg width="16" height="16" viewBox="0 0 20 20" fill="#d92d20" style={{flexShrink:0}}>
            <path d="M10 6a.75.75 0 0 1 .75.75v3.5a.75.75 0 0 1-1.5 0v-3.5A.75.75 0 0 1 10 6Z"/>
            <path d="M11 13a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"/>
            <path fillRule="evenodd" d="M17 10a7 7 0 1 1-14 0 7 7 0 0 1 14 0Zm-1.5 0a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0Z"/>
          </svg>
          <span style={{fontSize:13,color:'#d92d20',fontFamily:'Inter,sans-serif',lineHeight:'20px'}}>{error}</span>
        </div>
      )}
    </div>
  );
}

          <button (click)="increment()" type="button">&#x2303;</button>

        </div>
      </div>
    </div>
  \\\`,
  providers: [{ provide: NG_VALUE_ACCESSOR, useExisting: forwardRef(() => NumberInputComponent), multi: true }],
})
export class NumberInputComponent implements ControlValueAccessor {
  @Input() label = '';
  @Input() required = false;
  @Input() disabled = false;
  @Input() prefix = '';
  @Input() min?: number;
  @Input() max?: number;
  @Input() step = 1;

  value = '';
  hovered = false;
  focused = false;
  onChange = (_: any) => {};
  onTouched = () => {};

  increment() {
    const n = (parseFloat(this.value) || 0) + this.step;
    this.value = String(this.max !== undefined ? Math.min(n, this.max) : n);
    this.onChange(this.value);
  }
  decrement() {
    const n = (parseFloat(this.value) || 0) - this.step;
    this.value = String(this.min !== undefined ? Math.max(n, this.min) : n);
    this.onChange(this.value);
  }
  writeValue(v: any) { this.value = v ?? ''; }
  registerOnChange(fn: any) { this.onChange = fn; }
  registerOnTouched(fn: any) { this.onTouched = fn; }
  setDisabledState(d: boolean) { this.disabled = d; }
}`}

  private onChange_ = (_: any) => {};
  private onTouched_ = () => {};

    if (this.allowMultiple) return (this.value as string[]).includes(val);
    return this.value === val;
  }

  radioStyle(choice: ChoiceOption) {
    if (choice.disabled) return 'background:rgba(0,0,0,0.08);border:none';
    if (this.isSelected(choice.value)) return 'background:#303030;border:none';
    return 'background:#fdfdfd;border:0.66px solid #8a8a8a';
  }

  select(val: string) {
    this.value = val;
    this.onChange_(val);
    this.onTouched_();
  }

  toggle(val: string) {
    const cur = Array.isArray(this.value) ? this.value : [];
    this.value = cur.includes(val) ? cur.filter(v => v !== val) : [...cur, val];
    this.onChange_(this.value);
    this.onTouched_();
  }

  writeValue(v: any) { this.value = v ?? (this.allowMultiple ? [] : ''); }
  registerOnChange(fn: any) { this.onChange_ = fn; }
  registerOnTouched(fn: any) { this.onTouched_ = fn; }
  setDisabledState(d: boolean) {}

        <div style={{background:'#fff',border:'1.5px solid #e0e0e0',borderRadius:10,overflow:'hidden'}}>
          <table className="props-table">
            <thead><tr><th>Style</th><th>Value</th><th>When to use</th></tr></thead>
            <tbody>
              {[
                ['Default','1px #ebebeb, margin 4px 0','Between form sections, list items'],
                ['Strong','1.5px #e0e0e0, margin 8px 0','Between major content blocks'],
                ['Subtle','1px #f0f0f0, margin 0','Inside dense lists (intra-item)'],
              ].map(([style,val,when])=>(
                <tr key={style}>
                  <td style={{fontWeight:600}}>{style}</td>
                  <td><span className="prop-type">{val}</span></td>
                  <td>{when}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

/* ─── NAV CONFIG ────────────────────────────────────── */
const NAV = [
  {section:'Getting Started',items:[
    {label:'Overview',hash:'#home'},
  ]},
  {section:'Foundation',items:[
    {label:'Icons',hash:'#icons'},
  ]},
  {section:'Tokens',items:[
    {label:'Border',hash:'#border'},
    {label:'Color',hash:'#colors'},
    {label:'Shadow',hash:'#shadow'},
    {label:'Spacing',hash:'#spacing'},
    {label:'Typography',hash:'#typography'},
  ]},
  {section:'Components',items:[
    {label:'Accordion',hash:'#accordion'},
    {label:'Badge',hash:'#badge'},
    {label:'Banner',hash:'#banner'},
    {label:'Button',hash:'#button'},
    {label:'Button Group',hash:'#button-group'},
    {label:'Checkbox',hash:'#checkbox'},
    {label:'Checkbox List',hash:'#checkbox-list'},
    {label:'Choice List',hash:'#choice-list'},
    {label:'Index Table',hash:'#index-table'},
    {label:'Divider',hash:'#divider'},
    {label:'Overlay / Modal',hash:'#modal'},
    {label:'Text Input',hash:'#input'},
    {label:'Multiline text field',hash:'#textarea'},
    {label:'Number field',hash:'#number-input'},
    {label:'Tabs',hash:'#tabs'},
    {label:'Option List',hash:'#option-list'},
    {label:'Page',hash:'#page'},
    {label:'Pagination',hash:'#pagination'},
  ]},
  {section:'Guidelines',items:[
    {label:'Patterns',hash:'#patterns'},
    {label:'Accessibility',hash:'#accessibility'},
  ]},
];

const PAGE_MAP = {
  '#home': ['Overview','Getting Started'],
  '#colors': ['Color','Tokens'],
  '#typography': ['Typography','Tokens'],
  '#spacing': ['Spacing','Tokens'],
  '#shadow': ['Shadow','Tokens'],
  '#border': ['Border','Tokens'],
  '#icons': ['Icons','Foundation'],
  '#button': ['Button','Components'],
  '#button-group': ['Button Group','Components'],
  '#input': ['Text Input','Components'],
  '#textarea': ['Multiline text field','Components'],
  '#number-input': ['Number field','Components'],
  '#checkbox': ['Checkbox','Components'],
  '#checkbox-list': ['Checkbox List','Components'],
  '#choice-list': ['Choice List','Components'],
  '#index-table': ['Index Table','Components'],
  '#badge': ['Badge','Components'],
  '#banner': ['Banner','Components'],
  '#accordion': ['Accordion','Components'],
  '#modal': ['Overlay / Modal','Components'],
  '#divider': ['Divider','Components'],
  '#patterns': ['Patterns','Guidelines'],
  '#accessibility': ['Accessibility','Guidelines'],
};

function renderPage(hash) {
  switch(hash) {
    case '#colors': return <ColorsPage/>;
    case '#typography': return <TypographyPage/>;
    case '#spacing': return <SpacingPage/>;
    case '#shadow': return <ShadowsPage/>;
    case '#border': return <BordersPage/>;
    case '#icons': return <IconsPage/>;
    case '#button': return <ButtonPage/>;
    case '#button-group': return <ButtonGroupPage/>;
    case '#input': return <InputPage/>;
    case '#textarea': return <TextareaPage/>;
    case '#number-input': return <NumberInputPage/>;
    case '#tabs': return <TabsPage/>;
    case '#option-list': return <OptionListPage/>;
    case '#page': return <PagePage/>;
    case '#pagination': return <PaginationPage/>;
    case '#checkbox': return <CheckboxPage/>;
    case '#checkbox-list': return <CheckboxListPage/>;
    case '#choice-list': return <ChoiceListPage/>;
    case '#index-table': return <IndexTablePage/>;
    case '#badge': return <BadgePage/>;
    case '#banner': return <BannerPage/>;
    case '#accordion': return <AccordionPage/>;
    case '#modal': return <ModalPage/>;
    case '#divider': return <DividerPage/>;
    case '#patterns': return <PatternsPage/>;
    case '#accessibility': return <AccessibilityPage/>;
    default: return <HomePage/>;
  }
}

/* ─── ROOT ──────────────────────────────────────────── */
function App() {
  const hash = useHash();
  const [name, section] = PAGE_MAP[hash] || ['Overview','Getting Started'];

  return (
    <div className="layout">
      {/* SIDEBAR */}
      <aside className="sidebar">
        <div className="sidebar-logo">
          <div className="logo-wordmark" onClick={()=>navigate('#home')} style={{cursor:'pointer'}}>
            <div className="logo-icon">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M9 2L3 6V12L9 16L15 12V6L9 2Z" stroke="#15181f" strokeWidth="1.5" fill="#15181f" fillOpacity="0.2"/>
                <circle cx="9" cy="9" r="3" fill="#15181f"/>
              </svg>
            </div>
            <div>
              <div className="logo-text-top">Nexleaf</div>
              <div className="logo-text-main">PolTail</div>
            </div>
          </div>
          <div className="logo-version">Design System v2.1</div>
        </div>
        {NAV.map(s=>(
          <div key={s.section} className="nav-section">
            <div className="nav-section-label">{s.section}</div>
            {s.items.map(item=>(
              <button key={item.hash} className={`nav-item${hash===item.hash?' active':''}`} onClick={()=>navigate(item.hash)}>
                <span className="nav-dot"/>
                {item.label}
              </button>
            ))}
          </div>
        ))}
        <div style={{flex:1}}/>
        <div style={{padding:'16px 20px',borderTop:'1px solid rgba(255,255,255,0.07)'}}>
          <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',lineHeight:1.6}}>
            React 18 · Angular 17+<br/>
            Inter · JetBrains Mono<br/>
            © Nexleaf Analytics
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <main className="main">
        <div className="topbar">
          <div className="topbar-breadcrumb">
            {section} <span style={{color:'#9e9e9e',margin:'0 4px'}}>/</span> <span>{name}</span>
          </div>
          <div className="topbar-badges">
            <span className="framework-badge badge-react">React 18</span>
            <span className="framework-badge badge-angular">Angular 17+</span>
          </div>
        </div>
        {renderPage(hash)}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
